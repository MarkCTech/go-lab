name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go_CRUD_api/go.mod
          cache-dependency-path: go_CRUD_api/go.sum

      - name: Run backend tests
        working-directory: go_CRUD_api
        run: go test ./...

  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Select Compose files (GHA cache only when token can write actions cache)
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            echo "COMPOSE_FILE=docker-compose.yml:docker-compose.ci.yml" >> "$GITHUB_ENV"
          else
            echo "COMPOSE_FILE=docker-compose.yml" >> "$GITHUB_ENV"
          fi

      - name: Prepare env file
        run: cp .env.example .env

      - name: Build images
        run: docker compose build --parallel

      - name: Start stack
        run: docker compose up -d --no-build

      - name: Run migrations
        run: docker compose run --rm migrate

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "http://localhost:5000/readyz" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend readiness check timed out"
          exit 1

      - name: Run smoke tests
        shell: pwsh
        run: ./scripts/test.ps1

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs backend --tail 200
          docker compose logs frontend --tail 200
          docker compose logs mysql --tail 200

      - name: Teardown
        if: always()
        run: docker compose down -v
