openapi: 3.0.3
info:
  title: Platform API (Marble / TaskStack suite)
  description: |
    HTTP JSON API under `/api/v1` for the Marble / TaskStack suite platform service (implemented in this repository's `api` Go module).
    Success bodies use `{ "data": ..., "meta": { "request_id": "..." } }`.
    Errors use `{ "error": { "code", "message", "details?" }, "meta": { "request_id" } }`.

    **Authentication**
    - **Bearer**: HS256 platform JWT (`POST /auth/token` client_credentials) or OIDC access token when `OIDC_*` is configured.
    - **Session cookie**: HttpOnly session from `POST /auth/login`. Mutating requests with cookies must send the CSRF header (`X-CSRF-Token` by default) matching the non-HttpOnly CSRF cookie. Bearer-authenticated mutating requests skip CSRF.

    **Human-only operations**: `PUT` and `DELETE` on `/users/{id}` require an authenticated **end-user** subject (`user:<id>` from session or user-scoped Bearer). Subjects `client:*` (machine / client_credentials) receive 403.

    **Platform RBAC (players, characters, backups status, security, audit, support ack):** `GET /players`, `GET /characters`, `GET /backups/status`, `GET /security/me`, `GET /audit/admin-events`, and `POST /support/ack` require a **human** subject plus a **database** platform role (current model: `operator_accounts` + `operator_account_roles` + `platform_roles`; compatibility fallback may read legacy `user_platform_roles`). Insufficient permissions return 403. `POST /support/ack` requires header **`X-Platform-Action-Reason`** (minimum length enforced server-side).

    **Economy ledger (read-only):** `GET /economy/ledger` requires permission `economy.read` and a human subject. Query filters: `limit` (1–100, default 50), optional `before_id`, `platform_user_id`, `event_type`, `from`, `to` (RFC3339).

    **Backup restore governance (DataOps):** `GET /backups/status` and `GET /backups/restore-requests` require `backups.read`. Restore workflow mutations require `backups.restore.request` (create, cancel) or `backups.restore.approve` (approve, reject) or `backups.restore.fulfill` (fulfill after out-of-band restore). Two **distinct** approvers are required; neither may be the requester. Mutating routes require header **`X-Platform-Action-Reason`** (min length enforced). Physical backup/restore execution remains operator-owned.

    **Operator cases:** `GET /api/v1/cases` and related reads require `cases.read`. Case create/update/notes require `cases.write` and mutating routes require **`X-Platform-Action-Reason`**. Sanctions, recovery requests, and appeal resolution require `sanctions.write`, `recovery.write`, and `appeals.resolve` respectively. Gameplay enforcement remains **Marble**-authoritative; platform records governance and audit.
  version: 0.1.0

servers:
  - url: /
    description: API root (same host as backend; admin SPA may proxy `/api`).

tags:
  - name: health
  - name: auth
  - name: users
  - name: platform

paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness probe
      operationId: healthz
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok

  /readyz:
    get:
      tags: [health]
      summary: Readiness (DB ping + migration version when configured)
      operationId: readyz
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyOK"
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyNotOK"

  /api/v1/auth/register:
    post:
      tags: [auth]
      summary: Register email/password user
      operationId: authRegister
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRegisterResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Login (sets session + CSRF cookies)
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeLoginResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/logout:
    post:
      tags: [auth]
      summary: Logout (revokes session; CSRF required when session cookie present)
      operationId: authLogout
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeLogoutResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh session sliding window (CSRF required when using cookies)
      operationId: authRefresh
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeRefreshResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/csrf:
    get:
      tags: [auth]
      summary: Rotate CSRF cookie for an existing session
      operationId: authCsrf
      security:
        - sessionCookie: []
      responses:
        "200":
          description: CSRF cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeCsrfResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/change-password:
    post:
      tags: [auth]
      summary: Change password (end-user only; revokes sessions)
      operationId: authChangePassword
      security:
        - bearerAuth: []
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeChangePasswordResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/join-token:
    post:
      tags: [auth]
      summary: Issue short-lived join token for Marble handoff (end-user only)
      operationId: authJoinToken
      x-requiresHumanSubject: true
      security:
        - bearerAuth: []
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinTokenRequest"
      responses:
        "200":
          description: Join token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeJoinTokenResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/desktop/start:
    post:
      tags: [auth]
      summary: Start desktop login handoff (issue one-time exchange code; end-user only)
      operationId: authDesktopStart
      x-requiresHumanSubject: true
      security:
        - bearerAuth: []
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DesktopStartRequest"
      responses:
        "200":
          description: One-time exchange code issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeDesktopStartResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/desktop/exchange:
    post:
      tags: [auth]
      summary: Exchange one-time desktop code for user Bearer token
      operationId: authDesktopExchange
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DesktopExchangeRequest"
      responses:
        "200":
          description: Desktop access token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeDesktopExchangeResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/token:
    post:
      tags: [auth]
      summary: Issue HS256 Bearer (client_credentials)
      operationId: authToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeTokenResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/bootstrap:
    post:
      tags: [auth]
      summary: Temporary SPA bridge token (Origin allowlist; may be disabled)
      operationId: authBootstrap
      security: []
      parameters:
        - name: Origin
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeBootstrapTokenResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/users:
    get:
      tags: [users]
      summary: List users
      operationId: usersList
      security:
        - bearerAuth: []
        - sessionCookie: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeUserList"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [users]
      summary: Create user
      operationId: usersCreate
      security:
        - bearerAuth: []
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserWriteRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeUser"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/users/search:
    get:
      tags: [users]
      summary: Search users by name substring
      operationId: usersSearch
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK (empty when name blank)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeUserList"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/users/{id}:
    get:
      tags: [users]
      summary: Get user by id
      operationId: usersGetById
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeUser"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags: [users]
      summary: Update user (human subject only; not client_credentials)
      operationId: usersUpdate
      x-requiresHumanSubject: true
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserWriteRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeUser"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [users]
      summary: Delete user (human subject only; not client_credentials)
      operationId: usersDelete
      x-requiresHumanSubject: true
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: No content
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/players:
    get:
      tags: [platform]
      summary: List players (stub)
      operationId: platformPlayersList
      description: Requires platform permission `players.read` and human subject `user:<id>`.
      security:
        - bearerAuth: []
        - sessionCookie: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeObject"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/characters:
    get:
      tags: [platform]
      summary: List characters (stub)
      operationId: platformCharactersList
      description: Requires platform permission `characters.read` and human subject.
      security:
        - bearerAuth: []
        - sessionCookie: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeObject"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/cases:
    get:
      tags: [platform]
      summary: List operator cases
      operationId: platformCasesList
      description: Requires `cases.read` and human subject. Newest first; optional filters.
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: status
          in: query
          schema: { type: string }
        - name: subject_platform_user_id
          in: query
          schema: { type: integer, minimum: 1 }
        - name: before_id
          in: query
          schema: { type: integer, format: int64, minimum: 1 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeObject"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [platform]
      summary: Create operator case
      operationId: platformCasesCreate
      description: Requires `cases.write`, human subject, and `X-Platform-Action-Reason`.
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - name: X-Platform-Action-Reason
          in: header
          required: true
          schema: { type: string, minLength: 10 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperatorCaseCreateBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeObject"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/cases/{id}:
    get:
      tags: [platform]
      summary: Get one operator case
      operationId: platformCasesGet
      description: Requires `cases.read` and human subject.
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeObject"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags: [platform]
      summary: Update operator case (status, priority, assignment)
      operationId: platformCasesPatch
      description: Requires `cases.write`, human subject, and `X-Platform-Action-Reason`.
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
        - name: X-Platform-Action-Reason
          in: header
          required: true
          schema: { type: string, minLength: 10 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperatorCasePatchBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeObject"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/cases/{id}/notes:
    get:
      tags: [platform]
      summary: List notes on a case
      operationId: platformCasesNotesList
      description: Requires `cases.read` and human subject.
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeObject"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [platform]
      summary: Add note to case
      operationId: platformCasesNotesCreate
      description: Requires `cases.write`, human subject, and `X-Platform-Action-Reason`.
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
        - name: X-Platform-Action-Reason
          in: header
          required: true
          schema: { type: string, minLength: 10 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, minLength: 1 }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeObject"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/cases/{id}/actions:
    get:
      tags: [platform]
      summary: List privileged actions on a case
      operationId: platformCasesActionsList
      description: Requires `cases.read` and human subject.
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeObject"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/cases/{id}/sanctions:
    post:
      tags: [platform]
      summary: Record a sanction action on a case
      operationId: platformCasesSanctionCreate
      description: Requires `sanctions.write`, human subject, and `X-Platform-Action-Reason`. Marble applies enforcement out of band.
      security:
        - bearerAuth: []
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/CaseId"
        - name: X-Platform-Action-Reason
          in: header
          required: true
          schema: { type: string, minLength: 10 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperatorCaseSanctionBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeObject"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/cases/{id}/recovery-requests:
    post:
      tags: [platform]
      summary: Record a character recovery request on a case
      operationId: platformCasesRecoveryCreate
      description: Requires `recovery.write`, human subject, and `X-Platform-Action-Reason`.
      security:
        - bearerAuth: []
