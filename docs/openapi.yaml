components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: HS256 platform access token or OIDC access token (when configured).
    sessionCookie:
      type: apiKey
      in: cookie
      name: gl_session
      description: Session cookie from login (default name `gl_session`; override with env `SESSION_COOKIE_NAME`). Pair with CSRF cookie + header on unsafe methods.

  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    RestoreRequestId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    CaseId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1

  responses:
    ValidationError:
      description: Bad request / validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: VALIDATION_ERROR
              message: invalid request body
              details:
                field: body
            meta:
              request_id: ""
    UnauthorizedError:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ForbiddenError:
      description: Forbidden (CSRF, bootstrap disabled, or human-only route with client token)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFoundError:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ConflictError:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    RateLimitedError:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InternalError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    Meta:
      type: object
      required: [request_id]
      properties:
        request_id:
          type: string

    ErrorEnvelope:
      type: object
      required: [error, meta]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - VALIDATION_ERROR
                - NOT_FOUND
                - UNAUTHORIZED
                - FORBIDDEN
                - CONFLICT
                - INTERNAL_ERROR
                - NOT_IMPLEMENTED
                - RATE_LIMITED
            message:
              type: string
            details:
              type: object
              additionalProperties: true
        meta:
          $ref: "#/components/schemas/Meta"

    ReadyOK:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ready
        request_id:
          type: string

    ReadyNotOK:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: not_ready
        reason:
          type: string
        request_id:
          type: string
        error:
          type: string
        version:
          type: integer
        expected_min:
          type: integer

    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
          minLength: 1
          maxLength: 100

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    TokenRequest:
      type: object
      required: [grant_type, client_id, client_secret]
      properties:
        grant_type:
          type: string
          enum: [client_credentials]
        client_id:
          type: string
        client_secret:
          type: string

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8

    JoinTokenRequest:
      type: object
      required: [session_id]
      properties:
        session_id:
          type: string
          minLength: 3
          maxLength: 128

    DesktopStartRequest:
      type: object
      required: [session_id, code_challenge]
      properties:
        session_id:
          type: string
          minLength: 3
          maxLength: 128
        code_challenge:
          type: string
          minLength: 43
          maxLength: 43
          description: PKCE S256 code challenge (base64url, no padding).
        callback_uri:
          type: string
          description: Optional callback URL. Must be `http` loopback with host in `DESKTOP_EXCHANGE_CALLBACK_HOSTS`; no URL userinfo or fragment.

    DesktopExchangeRequest:
      type: object
      required: [exchange_code, code_verifier]
      properties:
        exchange_code:
          type: string
          minLength: 64
          maxLength: 64
          description: One-time exchange code (hex).
        code_verifier:
          type: string
          minLength: 43
          maxLength: 128
          description: PKCE verifier paired with `code_challenge`.

    UserWriteRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        pennies:
          type: integer
          minimum: 0

    User:
      type: object
      required: [id, name, pennies]
      properties:
        id:
          type: integer
        name:
          type: string
        pennies:
          type: integer

    EnvelopeRegisterResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [id, email, name]
          properties:
            id:
              type: integer
            email:
              type: string
            name:
              type: string
        meta:
          $ref: "#/components/schemas/Meta"

    EnvelopeLoginResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [user_id, email]
          properties:
            user_id:
              type: integer
            email:
              type: string
        meta:
          $ref: "#/components/schemas/Meta"

    EnvelopeLogoutResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [logged_out]
          properties:
            logged_out:
              type: boolean
        meta:
          $ref: "#/components/schemas/Meta"

    EnvelopeRefreshResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [refreshed, user_id]
          properties:
            refreshed:
              type: boolean
            user_id:
              type: integer
        meta:
          $ref: "#/components/schemas/Meta"

    EnvelopeCsrfResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [csrf_ready]
          properties:
            csrf_ready:
              type: boolean
        meta:
          $ref: "#/components/schemas/Meta"

    EnvelopeChangePasswordResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [password_changed, relogin_required]
          properties:
            password_changed:
              type: boolean
            relogin_required:
              type: boolean
        meta:
          $ref: "#/components/schemas/Meta"

    EnvelopeTokenResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [access_token, token_type, expires_in]
          properties:
            access_token:
              type: string
            token_type:
              type: string
              example: Bearer
            expires_in:
              type: integer
        meta:
          $ref: "#/components/schemas/Meta"

    EnvelopeJoinTokenResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [join_token, token_type, expires_in, session_id]
          properties:
            join_token:
              type: string
            token_type:
              type: string
              example: Bearer
            expires_in:
              type: integer
            session_id:
              type: string
        meta:
          $ref: "#/components/schemas/Meta"

    EnvelopeDesktopStartResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [exchange_code, expires_in, session_id, pkce_method]
          properties:
            exchange_code:
              type: string
            expires_in:
              type: integer
            session_id:
              type: string
            callback_uri:
              type: string
            pkce_method:
              type: string
              example: S256
        meta:
          $ref: "#/components/schemas/Meta"

    EnvelopeDesktopExchangeResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [access_token, token_type, expires_in, session_id, token_use]
          properties:
            access_token:
              type: string
            token_type:
              type: string
              example: Bearer
            expires_in:
              type: integer
            session_id:
              type: string
            token_use:
              type: string
              example: desktop_access
        meta:
          $ref: "#/components/schemas/Meta"

    EnvelopeBootstrapTokenResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [access_token, token_type, expires_in, bootstrap]
          properties:
            access_token:
              type: string
            token_type:
              type: string
            expires_in:
              type: integer
            bootstrap:
              type: object
              additionalProperties: true
        meta:
          $ref: "#/components/schemas/Meta"

    EnvelopeUser:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/User"
        meta:
          $ref: "#/components/schemas/Meta"

    EnvelopeUserList:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        meta:
          $ref: "#/components/schemas/Meta"

    EnvelopeObject:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          additionalProperties: true
        meta:
          $ref: "#/components/schemas/Meta"

    OperatorCaseCreateBody:
      type: object
      required: [subject_platform_user_id, title]
      properties:
        subject_platform_user_id:
          type: integer
          minimum: 1
        subject_character_ref:
          type: string
          nullable: true
        title:
          type: string
          minLength: 1
          maxLength: 256
        description:
          type: string
        priority:
          type: string
          description: One of low, normal, high, urgent (default normal).

    OperatorCasePatchBody:
      type: object
      properties:
        status:
          type: string
          description: open, in_progress, resolved, closed
        priority:
          type: string
